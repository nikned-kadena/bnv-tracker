name: Deploy Dashboard to GitHub Pages
on:
  workflow_run:
    workflows: ["BnV Daily Scraper"]
    types:
      - completed
  push:
    branches: [main]
    paths:
      - "dashboard/**"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package.json
      - name: Install & build
        working-directory: dashboard
        run: |
          npm install
          npm run build
      - name: Copy data into dist
        run: cp -r data/ dashboard/dist/data/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist
      - id: deployment
        uses: actions/deploy-pages@v4
