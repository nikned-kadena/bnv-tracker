name: BnV Daily Scraper

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.2.2

      - name: Run scraper
        run: |
          python scraper/scrape.py

      - name: Commit & push data
        run: |
          git config user.name  "bnv-bot"
          git config user.email "bnv-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || \
            git commit -m "data: snapshot $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
