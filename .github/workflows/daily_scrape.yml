name: Daily Scrape

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 08:00 ili 09:00 CET/CEST
  workflow_dispatch:
  push:
    paths:
      - "scraper/**"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml scraperapi-sdk

      # ── Halo Oglasi ─────────────────────────────────────────
      - name: Scrape Halo Oglasi — prodaja
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python scraper/scrape.py prodaja

      - name: Scrape Halo Oglasi — renta
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python scraper/scrape.py renta

      # ── Nekretnine.rs ────────────────────────────────────────
      - name: Scrape Nekretnine.rs
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python scraper/scrape_nrs.py

      # ── Commit data ──────────────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: daily scrape $(date -u +%Y-%m-%d)"
          git pull --rebase -X ours origin main || git rebase --abort
          git push --force-with-lease
