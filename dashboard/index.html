<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="BnV Market"/>
    <link rel="manifest" href="/manifest.json"/>
    <title>BnV Market Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Apsolutna putanja sa /bnv-tracker/ prefiksom: inline skripte
          // Vite NE prepravlja pri build-u, pa je golo '/sw.js' gadjalo
          // koren domena i tiho padalo sa 404.
          navigator.serviceWorker.register('/bnv-tracker/sw.js');
        });
      }
    </script>
  </body>
</html>
